version: "3.1"

stories:

- story: greet and help
  steps:
    - intent: greet
    - action: utter_greet

- story: goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- story: user says thanks
  steps:
    - intent: thank_you
    - action: utter_thank_you

# ── Complaint Reporting Flows ──

- story: citizen wants to report general complaint
  steps:
    - intent: report_complaint
    - action: utter_ask_start_form_or_guide

- story: citizen wants to report then asks about category
  steps:
    - intent: report_complaint
    - action: utter_ask_start_form_or_guide
    - intent: ask_departments
    - action: utter_departments_info

- story: citizen reports road issue directly
  steps:
    - intent: report_road_issue
    - action: utter_road_issue_detected
    - intent: affirm
    - action: utter_redirect_to_submit

- story: citizen reports road issue then goes away
  steps:
    - intent: report_road_issue
    - action: utter_road_issue_detected
    - intent: thank_you
    - action: utter_thank_you

- story: citizen reports water issue directly
  steps:
    - intent: report_water_issue
    - action: utter_water_issue_detected
    - intent: affirm
    - action: utter_redirect_to_submit

- story: citizen reports sanitation issue directly
  steps:
    - intent: report_sanitation_issue
    - action: utter_sanitation_issue_detected
    - intent: affirm
    - action: utter_redirect_to_submit

- story: citizen reports electricity issue directly
  steps:
    - intent: report_electricity_issue
    - action: utter_electricity_issue_detected
    - intent: affirm
    - action: utter_redirect_to_submit

- story: citizen reports drainage issue directly
  steps:
    - intent: report_drainage_issue
    - action: utter_drainage_issue_detected
    - intent: affirm
    - action: utter_redirect_to_submit

# ── Status Check Flows ──

- story: check complaint status with ID in message
  steps:
    - intent: check_complaint_status
      entities:
        - complaint_id: "CMP-2024-0012"
    - action: action_check_complaint_status

- story: check complaint status without ID
  steps:
    - intent: check_complaint_status
    - action: utter_ask_complaint_id

- story: check complaint status after asking for ID
  steps:
    - intent: check_complaint_status
    - action: utter_ask_complaint_id
    - intent: check_complaint_status
      entities:
        - complaint_id: "CMP-2024-0012"
    - action: action_check_complaint_status

# ── Platform Info Flows ──

- story: how platform works
  steps:
    - intent: ask_how_it_works
    - action: utter_how_it_works

- story: how platform works then report
  steps:
    - intent: ask_how_it_works
    - action: utter_how_it_works
    - intent: report_complaint
    - action: utter_ask_start_form_or_guide

- story: ask resolution time
  steps:
    - intent: ask_resolution_time
    - action: utter_resolution_time

- story: ask departments
  steps:
    - intent: ask_departments
    - action: utter_departments_info

- story: ask how to track
  steps:
    - intent: ask_track_complaint
    - action: utter_track_complaint

# ── Emergency Flows ──

- story: emergency contacts
  steps:
    - intent: ask_emergency_contacts
    - action: utter_emergency_contacts

- story: emergency then report issue
  steps:
    - intent: ask_emergency_contacts
    - action: utter_emergency_contacts
    - intent: report_complaint
    - action: utter_ask_start_form_or_guide

# ── Multi-turn Conversations ──

- story: full complaint journey
  steps:
    - intent: greet
    - action: utter_greet
    - intent: report_road_issue
    - action: utter_road_issue_detected
    - intent: affirm
    - action: utter_redirect_to_submit
    - intent: thank_you
    - action: utter_thank_you
    - intent: goodbye
    - action: utter_goodbye

- story: greet then emergency then complaint
  steps:
    - intent: greet
    - action: utter_greet
    - intent: ask_emergency_contacts
    - action: utter_emergency_contacts
    - intent: report_drainage_issue
    - action: utter_drainage_issue_detected
    - intent: affirm
    - action: utter_redirect_to_submit
